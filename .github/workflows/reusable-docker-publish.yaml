name: Reusable — Docker Build & Publish

on:
  workflow_call:
    inputs:
      image_name:
        description: |
          Image name under ghcr.io/<owner>/. The full reference becomes
          ghcr.io/<repository_owner>/<image_name>:<tag>, where
          <repository_owner> is resolved at job time via
          github.repository_owner.
        required: true
        type: string
      context:
        description: Build context passed to docker/build-push-action.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Path to the Dockerfile relative to the repository root.
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: |
          Comma-separated list of target platforms (e.g. "linux/amd64" or
          "linux/amd64,linux/arm64"). When more than one platform is given,
          QEMU is enabled automatically.
        required: false
        type: string
        default: "linux/amd64"
      tag_extra:
        description: |
          Optional additional tag rules appended to docker/metadata-action's
          default set. Useful for `type=raw,value=edge,enable=...` lines.
        required: false
        type: string
        default: ""
      push:
        description: Push the resulting image (false runs build-only).
        required: false
        type: boolean
        default: true
      registry:
        description: OCI registry to push to.
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      token:
        description: |
          Token used to authenticate with the registry. For ghcr.io, the
          caller workflow's GITHUB_TOKEN is sufficient as long as it carries
          `packages: write`.
        required: true
    outputs:
      digest:
        description: The pushed image digest (sha256:...).
        value: ${{ jobs.build.outputs.digest }}
      tags:
        description: The newline-separated list of tags that were pushed.
        value: ${{ jobs.build.outputs.tags }}

jobs:
  build:
    name: Build & publish ${{ inputs.image_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(inputs.platforms, ',')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          # Disable the action's default `latest=auto` so the `latest` tag is
          # set exclusively by the explicit `type=raw,value=latest,enable=...`
          # rule below. Without this, `latest=auto` adds a second, parallel
          # source for the `latest` tag (every tag-ref dispatch resets it),
          # which produced surprising drift in nolte/reachy-mini-mcp v0.1.1
          # where a manual `workflow_dispatch --ref v0.1.1` rewrote `latest`.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # `latest` is set on:
            #   - a non-prerelease GitHub Release publish event, or
            #   - a manual workflow_dispatch fired against a non-prerelease
            #     semver tag ref (no `-` qualifier in the tag name).
            # Both paths converge on the same intent: production releases
            # always own `:latest`, prereleases and branch-refs never do.
            type=raw,value=latest,enable=${{ (github.event_name == 'release' && !github.event.release.prerelease) || (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')) }}
            ${{ inputs.tag_extra }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
