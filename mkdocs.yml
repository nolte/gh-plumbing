site_name: GitHub Plumbing
site_description: Reusable GitHub Actions workflows and shared Probot configurations
site_url: https://nolte.github.io/gh-plumbing/
repo_name: nolte/gh-plumbing
repo_url: https://github.com/nolte/gh-plumbing
edit_uri: edit/develop/docs/

docs_dir: docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

# Header language switcher. The i18n plugin emits the SEO `hreflang`
# alternates automatically, but Material only renders the visible
# selector when `extra.alternate` is declared. Links carry the
# `/gh-plumbing/` site base (see site_url); `en` is the default locale
# and builds to the site root, `de` builds under `/de/`.
extra:
  alternate:
    - name: English
      link: /gh-plumbing/
      lang: en
    - name: Deutsch
      link: /gh-plumbing/de/
      lang: de

plugins:
  - search
  - include-markdown
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Getting started: Erste Schritte
            Workflows: Workflows
            Static tests: Statische Tests
            Documentation: Dokumentation
            Release: Release
            HACS validation: HACS-Validierung
            Probot: Probot
            Settings: Settings
            Labelling: Labelling
            Portfolio App: Portfolio-App
            Setup: Setup
            Development: Entwicklung

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

not_in_nav: |
  /includes/*

nav:
  - Home: index.md
  - Getting started:
      - getting-started/index.md
  - Workflows:
      - workflows/index.md
      - Static tests: workflows/static-tests.md
      - Coverage: workflows/coverage.md
      - Documentation: workflows/documentation.md
      - Release: workflows/release.md
      - HACS validation: workflows/hacs.md
  - Probot:
      - probot/index.md
      - Settings: probot/settings.md
      - Labelling: probot/labelling.md
  - Portfolio App:
      - Setup: portfolio-app/setup.md
  - Development:
      - development/index.md
